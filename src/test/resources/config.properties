# ===== Default configuration =====
# Overridden by config-<env>.properties and then by JVM/system/ENV values.

# API
api.base.url=https://test-api.quasarmarkets.com
api.connection.timeout.ms=10000
api.read.timeout.ms=30000
api.logging.enabled=true

# Retry (request-level)
api.retry.count=2
api.retry.backoff.ms=500

# Auth
auth.base.url=https://test-api.quasarmarkets.com/user-api/auth/login
auth.grant.type=password
auth.scope=openid profile
auth.static.ttl.seconds=3600
auth.token.ttl.seconds=3600
# Secrets should be injected via env vars: AUTH_USERNAME, AUTH_PASSWORD, AUTH_CLIENT_ID, AUTH_CLIENT_SECRET, AUTH_STATIC_TOKEN
auth.username=
auth.password=
auth.client.id=
auth.client.secret=
auth.static.token=

# Test-level retry (0 = disabled)
test.retry.count=0
